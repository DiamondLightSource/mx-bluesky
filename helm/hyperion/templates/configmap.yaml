apiVersion: v1
kind: ConfigMap
metadata:
  name: hyperion-supervisor-config
data:
  supervisor_config.yaml: |-
    # Configures the supervisor BlueAPI context to access the baton
    env:
      sources:
        - kind: deviceManager
          module: dodal.beamlines.{{ .Values.application.beamline }}_supervisor
          mock: {{ .Values.application.dev }}
    logging:
      graylog:
        url: {{ .Values.graylog.url }}
        enabled: true
  client_config.yaml: |-
    # Configuration for the BlueAPI client running in the hyperion supervisor
    api:
      url: {{ .Values.blueapi.url }}
    stomp:
      enabled: true
      url: {{ .Values.stomp.url }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hyperion-callbacks-config
data:
  blueapi_callbacks.yml: |-
    stomp:
      enabled: true
      url: {{ .Values.stomp.url }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hyperion-etc-config
data:
  # Debugging in VSCode requires username and home folder to be resolvable in /etc/passwd
  passwd: |
    root:x:0:0:root:/root:/bin/bash
    nobody:x:65534:65534:nobody:/nonexistent:/usr/sbin/nologin
    hyperion:x:1000:1000::/app:/bin/sh
    {{ .Values.callbacks.userName }}:x:{{ .Values.callbacks.runAsUser }}:{{ .Values.callbacks.runAsGroup }}:{{ .Values.callbacks.userName }}:/home/{{ .Values.callbacks.userName }}:/bin/bash
    {{ .Values.supervisor.userName }}:x:{{ .Values.supervisor.runAsUser }}:{{ .Values.supervisor.runAsGroup }}:{{ .Values.supervisor.userName }}:/home/{{ .Values.supervisor.userName }}:/bin/bash
  group: |
    root:x:0:
    hyperion:x:1000:
    nogroup:x:65534:
    {{ .Values.callbacks.userName }}:x:{{ .Values.callbacks.runAsGroup }}:
    {{ .Values.supervisor.userName }}:x:{{ .Values.supervisor.runAsGroup }}:
    
