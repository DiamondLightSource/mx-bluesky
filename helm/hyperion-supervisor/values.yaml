application:
  containerPort: 5006
  servicePort: 80
  imageRepository: ghcr.io/diamondlightsource
  imageName: hyperion
  imageVersion: SET_ON_INSTALL
  beamline: i03
  dev: false
  logDir: "/var/logs/mx-bluesky"
  runAsUser: 1000
  runAsGroup: 1000
initContainer:
  dodalBranch: "main"
scratch:
  volumeSize: "2Gi"
configServer:
  url: http://i03-daq-config-server.diamond.ac.uk
graylog:
  url: "tcp://graylog-log-target.diamond.ac.uk:12232"
stomp:
  url: tcp://localhost:61613
blueapi:
  url: http://my.blueapi.service:5005
logging:
  volume:
    - name: logdir
      emptyDir: {}
#      hostPath: "/dls_sw/i03/logs/bluesky/hyperion-k8s"
#      type: Directory
